<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- 禁用 HTML 快取 → iPhone 加到主畫面、桌機重訪都會抓最新版本 -->
    <!-- 帶 hash 的 JS/CSS 檔名仍可正常 cache，所以實際只會多抓 ~1KB HTML -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- iOS 加到主畫面時用 Web App 模式（隱藏 Safari UI） -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="西方戰術 SRPG" />
    <!-- PWA manifest（Android Chrome 會強制套 orientation: landscape）-->
    <link rel="manifest" href="manifest.json" />
    <title>西方戰術 SRPG</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        width: 100vw;
        height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
        color: #eee;
        overflow: hidden;
      }
      #game {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }
      #game canvas {
        display: block;
        touch-action: manipulation; /* 關閉 double-tap zoom，讓遊戲自己處理觸控 */
      }

      /* 直屏（手機豎著拿）→ 顯示「請旋轉」遮罩，蓋住整個遊戲 */
      #rotate-prompt {
        display: none;
      }
      @media (max-width: 900px) and (orientation: portrait) {
        #rotate-prompt {
          display: flex;
          position: fixed;
          inset: 0;
          background: #0a0a0a;
          color: #eee;
          align-items: center;
          justify-content: center;
          flex-direction: column;
          gap: 24px;
          z-index: 9999;
          text-align: center;
          padding: 24px;
        }
        #rotate-prompt .icon {
          font-size: 64px;
          animation: rotate-hint 1.6s ease-in-out infinite;
          transform-origin: center;
        }
        #rotate-prompt .title {
          font-size: 22px;
          font-weight: bold;
          color: #7ed1ff;
        }
        #rotate-prompt .desc {
          font-size: 15px;
          color: #888;
          line-height: 1.5;
        }
        #game { display: none; }
      }
      @keyframes rotate-hint {
        0%, 50%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(-90deg); }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="rotate-prompt">
      <div class="icon">📱</div>
      <div class="title">請將裝置橫向使用</div>
      <div class="desc">本遊戲設計為橫屏遊玩<br/>旋轉裝置即可開始</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
