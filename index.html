<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- 禁用 HTML 快取 → iPhone 加到主畫面、桌機重訪都會抓最新版本 -->
    <!-- 帶 hash 的 JS/CSS 檔名仍可正常 cache，所以實際只會多抓 ~1KB HTML -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- iOS 加到主畫面時用 Web App 模式（隱藏 Safari UI） -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="西方戰術 SRPG" />
    <!-- PWA manifest（Android Chrome 會強制套 orientation: landscape）-->
    <link rel="manifest" href="manifest.json" />
    <title>西方戰術 SRPG</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        width: 100vw;
        height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
        color: #eee;
        overflow: hidden;
      }
      #game {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }
      #game canvas {
        display: block;
        touch-action: manipulation; /* 關閉 double-tap zoom，讓遊戲自己處理觸控 */
      }

      /* 直屏（手機豎著拿）→ 顯示「請旋轉」遮罩，蓋住整個遊戲 */
      #rotate-prompt {
        display: none;
      }
      @media (max-width: 900px) and (orientation: portrait) {
        #rotate-prompt {
          display: flex;
          position: fixed;
          inset: 0;
          background: #0a0a0a;
          color: #eee;
          align-items: center;
          justify-content: center;
          flex-direction: column;
          gap: 24px;
          z-index: 9999;
          text-align: center;
          padding: 24px;
        }
        #rotate-prompt .icon {
          font-size: 64px;
          animation: rotate-hint 1.6s ease-in-out infinite;
          transform-origin: center;
        }
        #rotate-prompt .title {
          font-size: 22px;
          font-weight: bold;
          color: #7ed1ff;
        }
        #rotate-prompt .desc {
          font-size: 15px;
          color: #888;
          line-height: 1.5;
        }
        #game { display: none; }
      }
      @keyframes rotate-hint {
        0%, 50%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(-90deg); }
      }

      /* ===== 加入主畫面提示 banner =====
         手機 web 訪客（iOS / Android）首訪 1.5s 後跳出一行提示
         教他用瀏覽器選單加到主畫面，避免每次都得開瀏覽器找網址。
         已 standalone / 桌面 / 點過知道了 → 不顯示。 */
      #install-hint {
        display: none;
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: 12px;
        z-index: 9998;
        background: rgba(20, 28, 38, 0.96);
        border: 1px solid #4a90e2;
        border-radius: 10px;
        padding: 12px 14px;
        color: #eee;
        font-size: 14px;
        line-height: 1.5;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
        max-width: 560px;
        margin: 0 auto;
      }
      #install-hint .row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #install-hint .ico {
        font-size: 22px;
        flex-shrink: 0;
      }
      #install-hint .text {
        flex: 1;
      }
      #install-hint .text strong {
        color: #7ed1ff;
      }
      #install-hint .actions {
        display: flex;
        gap: 8px;
        margin-top: 8px;
        justify-content: flex-end;
      }
      #install-hint button {
        background: #2a3848;
        color: #eee;
        border: 1px solid #4a90e2;
        border-radius: 6px;
        padding: 6px 14px;
        font-size: 13px;
        cursor: pointer;
        font-family: inherit;
      }
      #install-hint button.primary {
        background: #4a90e2;
        color: #0a0a0a;
        font-weight: bold;
      }

      /* ===== 全局浮動靜音按鈕 =====
         右上角小圖示，每個 scene 都看得到；click → 切 BGM / SFX 全靜音。
         直屏 rotate-prompt 蓋住時也能按到（z-index 較高）。 */
      #mute-toggle {
        position: fixed;
        top: 8px;
        right: 8px;
        z-index: 10000;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: rgba(20, 28, 38, 0.85);
        border: 1px solid #4a90e2;
        color: #eee;
        font-size: 18px;
        line-height: 38px;
        text-align: center;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
        padding: 0;
        font-family: inherit;
      }
      #mute-toggle:active {
        background: #4a90e2;
        color: #0a0a0a;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <button id="mute-toggle" type="button" aria-label="切換音樂">🔊</button>
    <div id="rotate-prompt">
      <div class="icon">📱</div>
      <div class="title">請將裝置橫向使用</div>
      <div class="desc">本遊戲設計為橫屏遊玩<br/>旋轉裝置即可開始</div>
    </div>
    <div id="install-hint">
      <div class="row">
        <div class="ico" id="install-hint-icon">📲</div>
        <div class="text" id="install-hint-text">把遊戲加到主畫面，下次直接點開、無瀏覽器邊框、體感更好。</div>
      </div>
      <div class="actions">
        <button id="install-hint-dismiss">知道了</button>
        <button id="install-hint-action" class="primary" style="display:none">加入主畫面</button>
      </div>
    </div>
    <script>
      (function () {
        var DISMISS_KEY = 'install-hint-dismissed';
        var hint = document.getElementById('install-hint');
        var icon = document.getElementById('install-hint-icon');
        var text = document.getElementById('install-hint-text');
        var actionBtn = document.getElementById('install-hint-action');
        var dismissBtn = document.getElementById('install-hint-dismiss');

        // 已加到主畫面（standalone display-mode）→ 不需要提示
        var isStandalone =
          window.matchMedia('(display-mode: standalone)').matches ||
          window.navigator.standalone === true;
        if (isStandalone) return;
        if (localStorage.getItem(DISMISS_KEY) === '1') return;

        var ua = window.navigator.userAgent;
        var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
        var isAndroid = /Android/.test(ua);
        // 桌面瀏覽器不顯示（Steam-like 體驗下不需要）
        if (!isIOS && !isAndroid) return;

        var deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', function (e) {
          e.preventDefault();
          deferredPrompt = e;
          // Chrome 已支援程式化安裝 → 切到 primary 按鈕
          actionBtn.style.display = '';
          icon.textContent = '⬇️';
          text.innerHTML =
            '把遊戲<strong>加入主畫面</strong>後，下次直接點開、無瀏覽器邊框、體感更好。';
        });

        if (isIOS) {
          icon.textContent = '⎙';
          text.innerHTML =
            '想加入主畫面？點下方 <strong>分享 ⎙</strong> → 「<strong>加入主畫面</strong>」，下次點桌面圖示直接開遊戲。';
        } else {
          // Android 預設文案（beforeinstallprompt 沒觸發時的 fallback）
          text.innerHTML =
            '想加入主畫面？點瀏覽器右上 <strong>⋮ 選單</strong> → 「<strong>加入主畫面</strong>」，下次點桌面圖示直接開遊戲。';
        }

        actionBtn.addEventListener('click', function () {
          if (!deferredPrompt) return;
          deferredPrompt.prompt();
          var p = deferredPrompt.userChoice;
          if (p && typeof p.finally === 'function') {
            p.finally(function () {
              deferredPrompt = null;
              hint.style.display = 'none';
              localStorage.setItem(DISMISS_KEY, '1');
            });
          }
        });
        dismissBtn.addEventListener('click', function () {
          hint.style.display = 'none';
          localStorage.setItem(DISMISS_KEY, '1');
        });

        // 延 1.5s 顯示，避免一進來就被資訊轟炸
        setTimeout(function () {
          if (!localStorage.getItem(DISMISS_KEY)) hint.style.display = 'block';
        }, 1500);
      })();
    </script>
    <script>
      // 浮動靜音按鈕：等 main.ts 把 __srpgToggleMute 掛上 window 後綁定
      (function () {
        var btn = document.getElementById('mute-toggle');
        function refresh() {
          var muted = window.__srpgIsMuted && window.__srpgIsMuted();
          btn.textContent = muted ? '🔇' : '🔊';
        }
        btn.addEventListener('click', function () {
          if (typeof window.__srpgToggleMute === 'function') {
            window.__srpgToggleMute();
            refresh();
          }
        });
        // main.ts 是 module 會延後執行，輪詢直到 hook 註冊好再讀第一次狀態
        var tries = 0;
        var t = setInterval(function () {
          if (window.__srpgIsMuted) {
            refresh();
            clearInterval(t);
          } else if (++tries > 50) {
            clearInterval(t);
          }
        }, 100);
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
