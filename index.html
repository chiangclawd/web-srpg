<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>戰術 SRPG 原型 — Phase 1</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #1a1a1a;
        width: 100%;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
        color: #eee;
        overflow: hidden;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 12px;
        box-sizing: border-box;
      }
      #game {
        flex: 1 1 auto;
        width: 100%;
        max-width: 1058px;
        max-height: calc(100vh - 60px);
        aspect-ratio: 1058 / 690;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        border-radius: 4px;
        overflow: hidden;
      }
      #game canvas {
        display: block;
      }
      .footer {
        font-size: 12px;
        color: #777;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div class="footer">藍=我方　紅=敵方 · 兵種徽章：劍/槍/騎/弓/法 · 攻擊高亮：紅普通／橘剋制／紫被剋 · R 重開</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
